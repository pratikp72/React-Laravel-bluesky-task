version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bluesky
      POSTGRES_USER: bluesky
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
    command: sh -c "composer install && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_KEY: ${APP_KEY:-}
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: bluesky
      DB_USERNAME: bluesky
      DB_PASSWORD: secret
      FRONTEND_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      BLUESKY_BASE_URL: https://bsky.social
    volumes:
      - ./api:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  queue:
    build:
      context: ./api
    command: sh -c "composer install && php artisan queue:work --queue=scheduled-posts --tries=3 --backoff=15"
    environment:
      APP_KEY: ${APP_KEY:-}
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: bluesky
      DB_USERNAME: bluesky
      DB_PASSWORD: secret
    volumes:
      - ./api:/var/www/html
    depends_on:
      - postgres

  web:
    build:
      context: ./web
    command: npm run dev -- --host=0.0.0.0 --port=5173
    environment:
      VITE_API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
